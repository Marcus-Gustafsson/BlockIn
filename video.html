<!DOCTYPE html>
<html>
<head>
  <title>Blocked Video</title>
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 24px;
      box-sizing: border-box;
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;
    }
    video {
      width: 100%;
      height: auto;
      max-width: 1000px;
      max-height: 1000px;
    }
    .message {
      display: none;
      max-width: 520px;
      margin-top: 16px;
      color: #f2f2f2;
      line-height: 1.4;
      text-align: center;
    }
    .message.visible {
      display: block;
    }
  </style>
</head>
<body>
  <video controls autoplay id="videoPlayer">
    Your browser does not support the video tag.
  </video>
  <p class="message" id="videoMessage" role="status"></p>

  <script src="videos.js"></script>
  <script src="video.js"></script>
</body>
</html>
