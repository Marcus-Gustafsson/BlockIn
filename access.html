<!DOCTYPE html>
<html>
<head>
  <title>Timed Access</title>
  <style>
    body {
      align-items: center;
      background: #111;
      box-sizing: border-box;
      color: #f5f5f5;
      display: flex;
      font-family: Arial, sans-serif;
      justify-content: center;
      margin: 0;
      min-height: 100vh;
      padding: 24px;
    }

    main {
      max-width: 560px;
      width: 100%;
    }

    h1 {
      font-size: 28px;
      margin: 0 0 12px;
    }

    p {
      color: #d0d0d0;
      line-height: 1.5;
      margin: 0 0 20px;
    }

    .target {
      color: #fff;
      overflow-wrap: anywhere;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    button {
      border: 0;
      cursor: pointer;
      font-size: 16px;
      padding: 12px 16px;
    }

    .work {
      background: #f5f5f5;
      color: #111;
    }

    .procrastination {
      background: #444;
      color: #fff;
    }

    .message {
      color: #ffce73;
      margin-top: 16px;
      min-height: 22px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Work or procrastination?</h1>
    <p>
      You are opening <span id="target" class="target">this site</span>.
      Work gives 15 minutes on the main site. Blocked paths still stay blocked.
    </p>
    <div class="actions">
      <button id="work" class="work" type="button">Work</button>
      <button id="procrastination" class="procrastination" type="button">Procrastination</button>
    </div>
    <p id="message" class="message" role="status"></p>
  </main>

  <script src="access.js"></script>
</body>
</html>
