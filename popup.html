<!-- popup.html -->
<!DOCTYPE html>
<html>
<head>
  <title>bLockIn</title>
  <style>
    body {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      width: 320px;
    }

    h1 {
      font-size: 20px;
      margin: 0 0 8px;
    }

    p {
      color: #444;
      margin: 0 0 16px;
    }

    form {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    input {
      flex: 1;
      min-width: 0;
      padding: 8px;
    }

    button {
      cursor: pointer;
      padding: 8px 10px;
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    li {
      align-items: center;
      border-top: 1px solid #ddd;
      display: flex;
      gap: 8px;
      justify-content: space-between;
      padding: 8px 0;
    }

    .domain {
      overflow-wrap: anywhere;
    }

    .meta {
      color: #666;
      display: block;
      font-size: 12px;
      margin-top: 2px;
      overflow-wrap: anywhere;
    }

    .status {
      min-height: 18px;
      margin: 0 0 8px;
    }

    .empty {
      border-top: 1px solid #ddd;
      color: #666;
      padding-top: 10px;
    }

    .section-title {
      font-size: 15px;
      margin: 16px 0 8px;
    }
  </style>
</head>
<body>
  <h1>bLockIn</h1>
  <p>Manage sites that redirect to motivation videos.</p>
  <p id="status" class="status" role="status"></p>

  <h2 class="section-title">Blocked Sites</h2>
  <form id="add-site-form">
    <input id="site-domain" type="text" placeholder="youtube.com" autocomplete="off">
    <button type="submit">Add</button>
  </form>
  <ul id="blocked-sites"></ul>

  <h2 class="section-title">Allowed Paths</h2>
  <form id="add-allowed-path-form">
    <input id="allowed-path" type="text" placeholder="facebook.com/messages/*" autocomplete="off">
    <button type="submit">Allow</button>
  </form>
  <ul id="allowed-paths"></ul>

  <h2 class="section-title">Blocked Paths</h2>
  <form id="add-blocked-path-form">
    <input id="blocked-path" type="text" placeholder="youtube.com/shorts/*" autocomplete="off">
    <button type="submit">Block</button>
  </form>
  <ul id="blocked-paths"></ul>

  <h2 class="section-title">Timed Access Sites</h2>
  <form id="add-timed-site-form">
    <input id="timed-site-domain" type="text" placeholder="youtube.com/shorts/*" autocomplete="off">
    <button type="submit">Add</button>
  </form>
  <ul id="timed-sites"></ul>

  <script src="popup.js"></script>
</body>
</html>
